*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

#map{position:absolute;inset:0;z-index:1;background:#eef0ec}
.leaflet-tooltip.lbl{background:transparent;border:0;box-shadow:none;padding:0;white-space:nowrap;font-weight:700;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff,0 0 3px #fff;pointer-events:none}
.leaflet-tooltip.lbl:before{display:none;border:0}
.lbl-city{font-size:15px;color:#1b1b1b;letter-spacing:.5px}
.lbl-town{font-size:12px;color:#46505e}
.leaflet-container{background:#0b0d11;outline:none;font-family:inherit}
.leaflet-bar a{background:#1d2330;color:#e8ecf3;border-color:#2a3140}
.leaflet-bar a:hover{background:#283042}

/* 左側篩選面板（side navigation） */
.hud{position:absolute;top:0;left:0;bottom:0;z-index:1000;width:340px;padding:12px;pointer-events:none;display:flex}
.bar{pointer-events:auto;flex:1;min-width:0;overflow-y:auto;background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--line);
  border-radius:16px;padding:14px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
.row1{display:flex;align-items:center;gap:10px}
.brand{font-size:17px;font-weight:800;letter-spacing:.5px;white-space:nowrap}
.brand small{display:block;font-size:10px;color:var(--muted);font-weight:500;letter-spacing:1px}
.stat{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.5}
.stat b{color:var(--text);font-size:14px}
.fbtn{display:none;margin-left:auto;border:1px solid var(--line);background:#141925;color:var(--text);padding:6px 12px;border-radius:999px;font-size:12.5px;cursor:pointer;white-space:nowrap}
.fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.search{margin-top:10px;display:flex;align-items:center;gap:8px;background:#0f141d;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px}
.search svg{flex:none}
.pills{display:flex;flex-direction:column;gap:14px;margin-top:14px}
.pills .ftitle{font-size:11px;color:var(--muted);letter-spacing:1.5px;margin-bottom:6px}
.pills .grp{display:flex;gap:6px;flex-wrap:wrap}
.pills button{border:1px solid var(--line);background:#141925;color:var(--text);padding:6px 11px;border-radius:999px;font-size:12.5px;cursor:pointer;transition:.13s;white-space:nowrap}
.pills button:hover{border-color:#3a4660}
.pills button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.pills #regions button.active{background:var(--accent2);border-color:var(--accent2)}
.pills #regionCities{margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}

/* pin + cluster */
.pinwrap{position:relative;width:40px;height:52px;cursor:pointer}
.pinsvg{display:block;overflow:visible;filter:drop-shadow(0 3px 5px rgba(0,0,0,.45));transition:transform .12s ease;transform-origin:50% 100%}
.pinwrap:hover .pinsvg{transform:scale(1.12)}
.pinwrap.approx .pinsvg{opacity:.7}
.bd{position:absolute;top:-3px;right:-3px;min-width:18px;height:18px;padding:0 4px;background:var(--accent2);color:#fff;border-radius:999px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);z-index:3}
.pinwrap.approx .bd{background:#7c8aa6}
.cl{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;border:3px solid rgba(255,255,255,.85);box-shadow:0 3px 12px rgba(0,0,0,.5)}
.cl-sm{background:rgba(58,134,255,.95)}.cl-md{background:rgba(255,138,76,.95)}.cl-lg{background:rgba(255,90,95,.96);width:48px;height:48px;font-size:15px}

/* 抽屜 */
.scrim{position:absolute;inset:0;z-index:1500;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.2s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:1600;max-height:74%;background:var(--panel);
  border-top-left-radius:20px;border-top-right-radius:20px;transform:translateY(110%);
  transition:transform .3s cubic-bezier(.2,.85,.2,1);display:flex;flex-direction:column;box-shadow:0 -12px 44px rgba(0,0,0,.55)}
.sheet.show{transform:translateY(0)}
.grip{width:44px;height:5px;border-radius:99px;background:var(--line);margin:10px auto 4px}
.shead{padding:6px 20px 14px;border-bottom:1px solid var(--line)}
.shead h2{margin:0;font-size:19px}
.shead .meta{margin-top:5px;font-size:12.5px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.shead .flag{color:#fcd34d;border:1px solid #5c4a14;border-radius:99px;padding:1px 7px;font-size:11px}
.shead .lo{border-radius:99px;padding:1px 7px;font-size:11px}
.lo.exact{color:#6ee7b7;border:1px solid #234d3c}
.lo.approx{color:#9ec1ff;border:1px solid #2c3f63}
.cards{overflow-y:auto;padding:14px 16px 24px;display:flex;flex-direction:column;gap:12px}
.card{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;min-height:96px}
.thumb{width:92px;min-width:92px;align-self:stretch;object-fit:cover;background:#0c0f14}
.thumb.ph{display:flex;align-items:center;justify-content:center}
.thumb.logo{display:flex;align-items:center;justify-content:center;background:#0f141d;padding:12px}
.thumb.logo img{max-width:100%;max-height:60px;object-fit:contain}
.cbody{padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:5px;min-width:0;flex:1}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--line);color:var(--muted)}
.tag.permanent{color:#6ee7b7;border-color:#234d3c}.tag.special{color:#9ec1ff;border-color:#2c3f63}
.tag.soon{color:#fca5a5;border-color:#5c2626;background:rgba(220,60,60,.08)}
.tag.cat{color:#c4b5fd;border-color:#3b3160;background:rgba(124,92,255,.08)}
.tag.form{color:#86efac;border-color:#14532d;background:rgba(34,197,94,.08)}
.card h3{margin:0;font-size:15px;line-height:1.35}
.date{font-size:12.5px;color:var(--muted)}
.more{margin-top:1px;font-size:12.5px;color:var(--accent2);text-decoration:none;align-self:flex-start}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:26px}
.foot{position:absolute;left:352px;bottom:8px;z-index:1000;font-size:10.5px;color:var(--muted);
  background:rgba(15,17,21,.72);padding:5px 9px;border-radius:7px;max-width:60%;line-height:1.5}
@media(max-width:600px){
  .hud{right:0;bottom:auto;width:auto;padding:10px 10px 0}
  .bar{max-height:72vh}
  .fbtn{display:inline-block}
  .pills{display:none}
  .hud.open .pills{display:flex}
  .brand{font-size:15px}
  .foot{left:10px;max-width:90%}
}
/* 活動優先 popup card（取代場館底部抽屜） */
.evpop .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 32px rgba(0,0,0,.55)}
.evpop .leaflet-popup-content{margin:12px 14px;line-height:1.5;font-family:inherit;font-size:13px}
.evpop a.leaflet-popup-close-button{color:var(--muted);padding:6px 8px 0 0}
.evpop a.leaflet-popup-close-button:hover{color:var(--text)}
/* 矩形 card：移除下方箭頭尾巴與其留白 */
.leaflet-popup.evpop{margin-bottom:0}
.evpop .leaflet-popup-tip-container,.evpop .leaflet-popup-tip{display:none}
/* 統一一種排版與大小（橫式）：圖在上、滿版、固定高度。直式 KV 只是同一張卡「立起來」的圖，
   一樣塞進同尺寸的圖框（object-fit:cover 填滿裁切），不再有第二種大小。 */
.evcard{display:flex;flex-direction:column;gap:8px;min-width:0}
.evcard .evimg{display:block;flex:none;border-radius:10px;background:#0c0f14;width:100%;height:188px;object-fit:cover}
.evinfo{display:flex;flex-direction:column;gap:6px;min-width:0}
.evcard h3{margin:0;font-size:15px;line-height:1.35;color:var(--text)}
.evtags{display:flex;gap:6px;flex-wrap:wrap}
.evrow{font-size:12.5px;color:var(--muted)}
.evrow b{color:var(--text);font-weight:600}
.evstatus{font-weight:700}
.ev-on{color:#6ee7b7}.ev-up{color:#9ec1ff}.ev-soon{color:#fca5a5}.ev-perm{color:#fcd34d}.ev-over{color:#9aa6b8}
.evlink{display:inline-block;margin-top:2px;font-size:12.5px;color:var(--accent2);text-decoration:none}
.evlink:hover{text-decoration:underline}
.evmulti .evhead{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text)}
.evlist{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:2px}
.evitem{border:1px solid var(--line);border-radius:10px;background:var(--card)}
.evitem summary{cursor:pointer;padding:8px 10px;font-size:13px;font-weight:600;list-style:none;display:flex;justify-content:space-between;gap:8px;align-items:center}
.evitem summary::-webkit-details-marker{display:none}
.evitem summary .st{font-size:11px;font-weight:500;white-space:nowrap}
.evitem .evcard{padding:0 10px 10px}
/* popup 行動按鈕：想去 / 導航（深色 pill） */
.evacts{display:flex;gap:8px;margin-top:8px}
.evbtn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;border:1px solid var(--line);background:#141925;color:var(--text);
  padding:7px 10px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;transition:.13s;white-space:nowrap}
.evbtn:hover{border-color:#3a4660}
.evbtn .ic{font-size:13px;line-height:1}
.evbtn.favbtn.on{background:rgba(255,90,95,.14);border-color:var(--accent);color:#ffb3b5}
.evbtn.favbtn.on .ic{color:var(--accent)}
.evbtn.navbtn{color:var(--accent2)}
.evbtn.navbtn:hover{border-color:var(--accent2)}
/* popup 附近活動（直線距離，可展開列表跳轉） */
.evnearby{margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
.evnear-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:6px;border:none;background:none;color:var(--accent2);font-size:12.5px;font-weight:600;cursor:pointer;padding:0;text-align:left}
.evnear-toggle .arr{color:var(--muted);font-size:11px;transition:.13s}
.evnearby.open .evnear-toggle .arr{transform:rotate(180deg)}
.evnear-list{display:none;margin-top:6px;max-height:150px;overflow-y:auto;flex-direction:column;gap:4px;padding-right:2px}
.evnearby.open .evnear-list{display:flex}
.evnear-item{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 8px;font-size:12px;color:var(--text);cursor:pointer;text-align:left;transition:.13s}
.evnear-item:hover{border-color:var(--accent2)}
.evnear-item .ttl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.evnear-item .dist{color:var(--muted);white-space:nowrap;font-size:11.5px}
/* 已收藏圖釘小愛心 */
.favdot{position:absolute;top:21px;right:-3px;min-width:16px;height:16px;padding:0 2px;background:var(--accent);color:#fff;
  border-radius:999px;font-size:10px;line-height:16px;text-align:center;border:2px solid var(--bg);z-index:3}
/* 即將結束圖釘紅點（時間狀態提示、顏色僅輔助；與 favdot 共存：紅點左上、愛心頭部右側、數字右上） */
.soondot{position:absolute;top:-2px;left:-2px;width:12px;height:12px;background:var(--accent);border-radius:50%;border:2px solid var(--bg);z-index:3;box-shadow:0 0 0 1px rgba(255,90,95,.4)}
/* 側欄「想去 N」入口 */
.faventry{margin-top:8px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#141925;color:var(--muted);
  padding:5px 10px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.13s}
.faventry:hover{border-color:#3a4660;color:var(--text)}
.faventry .hrt{color:var(--accent);font-size:13px}
.faventry .n{min-width:18px;height:18px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center;
  background:#0f141d;border:1px solid var(--line);border-radius:999px;font-size:11px;color:var(--text)}
.faventry.has{color:var(--text);border-color:#4a2b2e}
.faventry.has .n{background:rgba(255,90,95,.14);border-color:var(--accent);color:#ffb3b5}
/* 收藏浮層 */
.favscrim{position:absolute;inset:0;z-index:1700;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.2s}
.favscrim.show{opacity:1;pointer-events:auto}
.favpanel{position:absolute;top:0;bottom:0;left:0;z-index:1800;width:360px;max-width:88%;background:var(--panel);border-right:1px solid var(--line);
  box-shadow:12px 0 40px rgba(0,0,0,.5);transform:translateX(-108%);transition:transform .28s cubic-bezier(.2,.85,.2,1);display:flex;flex-direction:column}
.favpanel.show{transform:translateX(0)}
.favhead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
.favhead h2{margin:0;font-size:16px}
.favclose{border:none;background:none;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:0 4px}
.favclose:hover{color:var(--text)}
.favtools{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.favtool{border:1px solid var(--accent2);background:rgba(58,134,255,.12);color:#bcd4ff;padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.13s}
.favtool:hover{background:rgba(58,134,255,.22)}
.favtoolnote{font-size:11.5px;color:var(--muted)}
.favlist{flex:1;overflow-y:auto;padding:12px 14px 20px;display:flex;flex-direction:column;gap:10px}
.favempty{color:var(--muted);font-size:13px;text-align:center;padding:30px 12px;line-height:1.6}
.favitem{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:pointer;transition:.13s}
.favitem:hover{border-color:#3a4660}
.favmeta{min-width:0;flex:1}
.favttl{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.35}
.favsub{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.favnear{color:#fcd34d;border:1px solid #5c4a14;border-radius:999px;padding:0 6px;font-size:10.5px}
.favrm{flex:none;border:1px solid var(--line);background:#141925;color:var(--muted);padding:5px 10px;border-radius:999px;font-size:12px;cursor:pointer;transition:.13s}
.favrm:hover{border-color:var(--accent);color:#ffb3b5}
@media(max-width:600px){ .favpanel{width:88%} }
</style></head>
<body><div id="app">
<div id="map"></div>
<aside class="hud" id="sidebar"><div class="bar">
  <div class="row1">
    <div class="brand">全台 ACG 活動地圖<small>TAIWAN ACG EVENT MAP</small></div>
    <button class="fbtn" id="fbtn" type="button" aria-expanded="false">篩選</button>
  </div>
  <div class="stat" id="stat">載入中…</div>
  <button type="button" class="faventry" id="favEntry" aria-haspopup="dialog" aria-expanded="false">
    <span class="hrt">♥</span><span>想去</span><span class="n" id="favN">0</span>
  </button>
  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="#9aa6b8" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="q" placeholder="搜尋活動、作品、場館或地區…">
  </div>
  <div class="pills">
    <div class="fsec">
      <div class="ftitle">時間</div>
      <div class="grp" id="ftime">
        <button data-t="all" class="active">全部時段</button>
        <button data-t="ongoing">進行中</button>
        <button data-t="upcoming">即將開始</button>
        <button data-t="ending">即將結束</button>
      </div>
    </div>
    <div class="fsec">
      <div class="ftitle">活動形式</div>
      <div class="grp" id="fform">
        <button data-f="all" class="active">全部形式</button>
        <button data-f="展覽">展覽</button>
        <button data-f="快閃店">快閃店</button>
        <button data-f="主題餐廳">主題餐廳</button>
        <button data-f="體驗活動">體驗活動</button>
      </div>
    </div>
    <div class="fsec">
      <div class="ftitle">地區</div>
      <div class="grp" id="regions">
        <button data-r="all">全台</button>
        <button data-r="north">北</button>
        <button data-r="central">中</button>
        <button data-r="south">南</button>
        <button data-r="east">東</button>
      </div>
      <div class="grp" id="regionCities" style="display:none"></div>
    </div>
  </div>
</div></aside>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <div class="shead"><h2 id="sTitle"></h2><div class="meta" id="sMeta"></div></div>
  <div class="cards" id="cards"></div>
</div>
<div class="favscrim" id="favScrim"></div>
<div class="favpanel" id="favPanel" role="dialog" aria-modal="true" aria-label="想去清單">
  <div class="favhead">
    <h2>♥ 想去清單</h2>
    <button type="button" class="favclose" id="favClose" aria-label="關閉">×</button>
  </div>
  <div class="favtools" id="favTools"></div>
  <div class="favlist" id="favList"></div>
</div>
<div class="foot" id="foot"></div>
</div>

const FAV_LS_KEY='acg_favs';
/* 穩定鍵：優先併入活動連結 e.l，再加上場館名/活動名/開始日，避免不同場館同名活動衝突 */
function favKey(e,v){ return [(v&&v.name)||'', e&&e.t||'', e&&e.s||'', e&&e.l||''].join('¦'); }
function loadFavs(){ try{ const r=localStorage.getItem(FAV_LS_KEY); const a=r?JSON.parse(r):[]; return Array.isArray(a)?a:[]; }catch(err){ return []; } }
function saveFavs(a){ try{ localStorage.setItem(FAV_LS_KEY, JSON.stringify(a||[])); }catch(err){} }
function isFav(e,v){ return loadFavs().indexOf(favKey(e,v))!==-1; }
function toggleFav(e,v){ const k=favKey(e,v); const a=loadFavs(); const i=a.indexOf(k); if(i===-1) a.push(k); else a.splice(i,1); saveFavs(a); return i===-1; }
function favCount(){ return loadFavs().length; }

function logoThumbUrl(u){
  u=String(u||'').trim();
  if(!u.startsWith('logos/')) return u;
  const q=u.search(/[?#]/), clean=q>=0?u.slice(0,q):u;
  const slash=clean.lastIndexOf('/'), dot=clean.lastIndexOf('.');
  if(dot<=slash) return u;
  const rel=clean.slice('logos/'.length,dot);

let pinLogoObserver=null;
function loadPinLogo(img){
  const src=img.dataset.src;
  if(!src) return;
  img.removeAttribute('data-src');
  img.onload=()=>img.classList.add('loaded');
  img.onerror=()=>{
    const fallback=img.dataset.fallback;
    if(fallback && img.src!==fallback){
      img.onerror=()=>img.remove();
      img.src=fallback;
    }else{
      img.remove();
    }
  };
  img.src=src;
}
function observePinLogos(){
  const root=document.getElementById('map');
  const imgs=[...root.querySelectorAll('img.lazy-logo[data-src]')];
  if(!imgs.length) return;
  if('IntersectionObserver' in window){
    if(!pinLogoObserver){
      pinLogoObserver=new IntersectionObserver(entries=>{
        entries.forEach(entry=>{
          if(!entry.isIntersecting) return;
          pinLogoObserver.unobserve(entry.target);
          loadPinLogo(entry.target);
        });
      },{root,rootMargin:'180px'});
    }
    imgs.forEach(img=>pinLogoObserver.observe(img));
  }else{
    const run=()=>imgs.forEach(loadPinLogo);
    if('requestIdleCallback' in window) requestIdleCallback(run,{timeout:800});
    else setTimeout(run,120);
  }
}

const cityLabels=L.layerGroup(), townLabels=L.layerGroup();
(function(){
  const byCounty={};
  for(const k in TOWN_C){ const sp=k.split('|'), cy=sp[0], tw=sp[1], c=TOWN_C[k];
    (byCounty[cy]=byCounty[cy]||[]).push(c);
    townLabels.addLayer(L.tooltip({permanent:true,direction:'center',className:'lbl lbl-town',opacity:1}).setLatLng(c).setContent(tw));
  }
  for(const cy in byCounty){ const a=byCounty[cy]; let la=0,lo=0; a.forEach(p=>{la+=p[0];lo+=p[1];}); la/=a.length; lo/=a.length;
    cityLabels.addLayer(L.tooltip({permanent:true,direction:'center',className:'lbl lbl-city',opacity:1}).setLatLng([la,lo]).setContent(cy));
  }
})();
function syncLabels(){ const z=map.getZoom();
  if(z>=11){ if(map.hasLayer(cityLabels))map.removeLayer(cityLabels); if(!map.hasLayer(townLabels))map.addLayer(townLabels); }
  else { if(map.hasLayer(townLabels))map.removeLayer(townLabels); if(!map.hasLayer(cityLabels))map.addLayer(cityLabels); }
}
map.on('zoomend',syncLabels); syncLabels();

const cluster=L.markerClusterGroup({
  maxClusterRadius:46, showCoverageOnHover:false, spiderfyOnMaxZoom:true,
  iconCreateFunction:function(c){
    let sum=0; c.getAllChildMarkers().forEach(m=>sum+=m.exCount||0);
    let k= sum>=20?'lg': sum>=8?'md':'sm';
    return L.divIcon({html:'<div class="cl cl-'+k+'">'+sum+'</div>',className:'',iconSize:[42,42]});
  }
});
map.addLayer(cluster);
map.on('moveend zoomend',()=>setTimeout(observePinLogos,0));
cluster.on('animationend spiderfied unspiderfied',()=>setTimeout(observePinLogos,0));

/* 篩選邏輯 */
function matchEx(e){
  if(state.cat!=='all' && e.c!==state.cat) return false;  /* 只顯示 ACG（文創園區僅用來確認是否有 ACG 活動，其餘不顯示） */
  if(state.form!=='all' && e.c2!==state.form) return false;
  if(state.type==='permanent' && e.ty!=='permanent') return false;
  if(state.type==='special' && e.ty!=='special') return false;
  if(state.time!=='all'){
    if(e.ty==='permanent') return state.time==='ongoing';
    const ds=parseD(e.s), de=parseD(e.e);
    if(state.time==='ongoing'){ if(!((!ds||ds<=TODAY)&&(!de||de>=TODAY))) return false; }
    else if(state.time==='upcoming'){ if(!(ds&&ds>TODAY)) return false; }
    else if(state.time==='ending'){ const d=daysLeft(e.e); if(!(d!==null&&d>=0&&d<=ENDING_SOON_DAYS)) return false; }
  }
  return true;
}
function venueExs(v){
  let exs=v.ex.filter(matchEx);
  if(state.q){
    const q=state.q.toLowerCase();
    const hitV=((v.name||'')+(v.city||'')+(v.addr||'')).toLowerCase().includes(q);
    if(!hitV) exs=exs.filter(e=>(e.t||'').toLowerCase().includes(q));
  }
  return exs;
}

/* 該批（已通過篩選的）活動是否含「即將結束」（供 pinHtml 紅點；常設展不計） */
function exsHasSoon(exs){
  return exs.some(e=>{ if(e.ty==='permanent') return false; const d=daysLeft(e.e); return d!==null&&d>=0&&d<=ENDING_SOON_DAYS; });
}

/* 點是否在多邊形內（ray-casting；座標為 [lng,lat]）*/
function _pip(pt, ring){ let x=pt[0], y=pt[1], inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){ const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside; }
  return inside; }
/* 用座標對鄉鎮界算出「縣市+區」（無來源地址時的後備，取自真實界線非杜撰）*/
function townOf(la,lo){ const pt=[lo,la];
  for(const f of ((typeof TW_GEO!=='undefined'&&TW_GEO.features)||[])){ const g=f.geometry; if(!g) continue;
    const polys = g.type==='Polygon'?[g.coordinates]:(g.type==='MultiPolygon'?g.coordinates:[]);
    for(const poly of polys){ if(poly[0] && _pip(pt,poly[0])){ const p=f.properties||{}; return (p.county||'')+(p.town||''); } } }
  return ''; }
/* 圖卡地址：優先用來源完整地址（縣市+區+路段），否則用座標推得的縣市+區，再否則只有縣市 */

/* 地區（縣市+區）：優先座標推算，否則縣市 */
function venueRegion(v){ return townOf(v.la,v.lo) || v.city || ''; }

const NEARBY_RADIUS_M=2000;
function distTxt(m){ return m<1000 ? Math.round(m)+' 公尺' : (m/1000).toFixed(1)+' 公里'; }
/* 以場館 v 為圓心，掃描其他地點中「通過目前篩選（venueExs）」的活動，每筆＝一個活動，依距離近→遠 */
function nearbyOf(v){
  const out=[];
  DATA.venues.forEach(o=>{
    if(o===v) return;
    if(typeof o.la!=='number'||typeof o.lo!=='number') return;
    const d=haversine(v.la,v.lo,o.la,o.lo);
    if(d>NEARBY_RADIUS_M) return;
    venueExs(o).forEach(e=>out.push({e,v:o,d}));
  });
  out.sort((a,b)=>a.d-b.d);
  return out;
}
function nearbyHtml(list){

    +'<button type="button" class="evnear-toggle" aria-expanded="false">附近 '+(NEARBY_RADIUS_M/1000)+' 公里內還有 '+list.length+' 個活動<span class="arr">▾</span></button>'

/* 依 KV 圖片實際長寬決定橫式/直式排版（圖片非同步載入，故載入後再判定並置中） */
/* 將 popup card 置中，但卡片要在來源圖釘「上方」且不遮住圖釘。
   圖釘 iconSize[40,52]/iconAnchor[20,50]：釘身在 latlng 上方約 50px。popup 以 offset 往上抬
   POPUP_OFFSET_Y，讓卡片下緣落在釘身上方留白處；置中時把這段位移一起算進去。
   地圖 maxBounds 很緊，純 panBy 在小 zoom 會被夾住，故直接算目標中心 setView，必要時放大到 CENTER_MIN_ZOOM。*/
const CENTER_MIN_ZOOM=12;
const POPUP_OFFSET_Y=64;   /* 釘身高約 50px + 露出留白 14px */
let _centerTimer=0;
function centerPopup(pop){
  if(_centerTimer) clearTimeout(_centerTimer);
  _centerTimer=setTimeout(()=>{ _centerTimer=0; _centerCard(pop); },0);
}
function _centerCard(pop){
  if(!pop||!map) return;
  const el=pop.getElement(); if(!el) return;
  const wrap=el.querySelector('.leaflet-popup-content-wrapper')||el;
  const wr=wrap.getBoundingClientRect();
  const size=map.getSize();
  const mr=map.getContainer().getBoundingClientRect();
  /* 可視地圖區域（container 座標）：桌機扣左側欄、手機扣頂部面板 */
  let regL=0, regR=size.x, regT=0, regB=size.y;
  const hud=document.querySelector('.hud');
  if(hud){
    const h=hud.getBoundingClientRect();
    if(window.matchMedia('(max-width:600px)').matches) regT=Math.max(regT,h.bottom-mr.top);
    else regL=Math.max(regL,h.right-mr.left);
  }
  const Sx=(regL+regR)/2, Sy=(regT+regB)/2;        /* 卡片中心落在可視區中央 */
  const wrapH=wr.height;
  const M=pop.getLatLng();
  const Z=Math.max(map.getZoom(), CENTER_MIN_ZOOM);
  /* 卡片以 offset 往上抬 POPUP_OFFSET_Y，故卡片下緣＝圖釘上方 POPUP_OFFSET_Y。要讓卡片中心＝(Sx,Sy)，
     圖釘 M 需投影到 container 的 (Sx, Sy + wrapH/2 + POPUP_OFFSET_Y)（圖釘落在卡片下方、露出來）。*/
  const target=map.unproject(map.project(M,Z).add(L.point(size.x/2-Sx, size.y/2-Sy-wrapH/2-POPUP_OFFSET_Y)), Z);
  map.setView(target, Z, {animate:true});
}
function openVenuePopup(v,m,latlng){
  const exs=venueExs(v); if(!exs.length) return;
  let html;
  if(exs.length===1){ html=popupCardHtml(exs[0],v); }
  else{
    html='<div class="evmulti"><div class="evhead">此地點共有 '+exs.length+' 個活動</div><div class="evlist">'
      +exs.map((e,i)=>{ const st=popupStatus(e);
        return '<details class="evitem"'+(i===0?' open':'')+'><summary><span class="ttl">'+esc(e.t)
          +'</span><span class="st ev-'+st.k+'">'+esc(st.t)+'</span></summary>'+popupCardHtml(e,v,true)+'</details>';
      }).join('')+'</div></div>';
  }
  /* 附近 2 公里內、通過目前篩選的其他地點活動（排除自己） */
  const nearby=nearbyOf(v);
  html+=nearbyHtml(nearby);
  /* 固定寬度（min=max）→ 每個 popup 大小一致；點擊後由 centerPopup 置中，不用 autoPan。
     寬度上限收斂到「可視地圖區域」寬度，避免窄桌機視窗時卡片被側欄遮住或溢出畫面。*/
  const _cont=map.getContainer(), _hud=document.querySelector('.hud');
  let _avail=_cont.clientWidth;
  if(_hud && !window.matchMedia('(max-width:600px)').matches) _avail=_cont.clientWidth-_hud.offsetWidth;
  const PW=Math.max(240, Math.min(340, _avail-24));
  /* 以圖釘實際座標為錨點（而非點擊點），卡片才會精準落在圖釘正上方；offset 往上抬讓圖釘露出。 */
  const anchor=(m&&m.getLatLng)?m.getLatLng():latlng;
  const pop=L.popup({className:'evpop',autoPan:false,
    maxWidth:PW,minWidth:PW,offset:L.point(0,-POPUP_OFFSET_Y),closeButton:true})
    .setLatLng(anchor||m.getLatLng()).setContent(html);
  pop.openOn(map);
  const root=pop.getElement();
  if(root){
    centerPopup(pop);
    root.querySelectorAll('details.evitem').forEach(d=>{
      d.addEventListener('toggle',()=>{
        if(d.open) root.querySelectorAll('details.evitem').forEach(o=>{ if(o!==d) o.open=false; });
        pop.update();
      });
    });
    /* 「想去」toggle：用事件委派掛在穩定的 popup root 上（Leaflet 於 autoPan 會重建內容節點，
       直接掛在按鈕上的監聽會失效），依 .evcard 在 DOM 中的順序對應 exs（單一與多活動皆一致） */
    root.addEventListener('click',ev=>{
      const btn=ev.target.closest('button.favbtn'); if(!btn||!root.contains(btn)) return;
      ev.preventDefault(); ev.stopPropagation();
      const card=btn.closest('.evcard'); if(!card) return;
      const idx=[...root.querySelectorAll('.evcard')].indexOf(card);
      const ex=exs[idx]; if(!ex) return;
      const nowFav=toggleFav(ex,v);
      btn.classList.toggle('on',nowFav);
      btn.setAttribute('aria-pressed',nowFav?'true':'false');
      const ic=btn.querySelector('.ic'), lb=btn.querySelector('.lb');
      if(ic) ic.textContent=nowFav?'♥':'♡';
      if(lb) lb.textContent=nowFav?'已想去':'想去';
      updateFavCountUI();
      if(favPanelOpen()) renderFavPanel();
      updateVenueMarkerFav(v);
    });
    /* 附近活動：展開/收合＋點擊跳轉。同樣用事件委派掛在 root（popup 內容節點可能被 pop.update() 重建）；
       展開只調整位置（_updatePosition/_adjustPan），不呼叫 pop.update() 以免重建內容、弄掉展開狀態 */
    root.addEventListener('click',ev=>{
      const tg=ev.target.closest('.evnear-toggle');
      if(tg&&root.contains(tg)){
        ev.preventDefault(); ev.stopPropagation();
        const w=tg.closest('.evnearby'); if(!w) return;
        const open=w.classList.toggle('open');
        tg.setAttribute('aria-expanded',open?'true':'false');
        if(pop._updatePosition) pop._updatePosition();
        if(pop._adjustPan) pop._adjustPan();
        return;
      }
      const item=ev.target.closest('.evnear-item');
      if(item&&root.contains(item)){
        ev.preventDefault(); ev.stopPropagation();
        const it=nearby[+item.dataset.near]; if(!it) return;
        const nv=it.v, mk=markers.find(x=>x._v===nv);
        map.setView([nv.la,nv.lo], Math.max(map.getZoom(),15));
        openVenuePopup(nv,mk,L.latLng(nv.la,nv.lo));
      }
    });
  }
}

/* 兩點球面距離（公尺） */
function haversine(a1,o1,a2,o2){
  const R=6371000, r=Math.PI/180;
  const dLa=(a2-a1)*r, dLo=(o2-o1)*r;
  const s=Math.sin(dLa/2)**2+Math.cos(a1*r)*Math.cos(a2*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s)));
}
const FAV_NEAR_M=2000;
function renderFavPanel(){
  const items=collectFavItems();
  const listEl=document.getElementById('favList');
  const toolsEl=document.getElementById('favTools');
  if(!listEl||!toolsEl) return;
  if(!items.length){
    toolsEl.innerHTML='';
    listEl.innerHTML='<div class="favempty">還沒有收藏。在活動卡點「想去」即可加入。</div>';
    return;
  }
  /* 找出彼此接近（2km 內）的場館 */
  const vlist=items.map(it=>it.v);
  const nearSet=new Set();
  for(let i=0;i<vlist.length;i++) for(let j=i+1;j<vlist.length;j++){
    const a=vlist[i], b=vlist[j]; if(a===b) continue;
    if(haversine(a.la,a.lo,b.la,b.lo)<=FAV_NEAR_M){ nearSet.add(a); nearSet.add(b); }
  }
  toolsEl.innerHTML='<button type="button" class="favtool" id="favShowAll">在地圖顯示全部收藏</button>'
    +'<span class="favtoolnote">共 '+items.length+' 筆</span>';
  listEl.innerHTML=items.map((it,i)=>{
    const e=it.e, v=it.v;
    const near=nearSet.has(v)?'<span class="favnear">彼此接近</span>':'';
    return '<div class="favitem" data-i="'+i+'">'
      +'<div class="favmeta"><div class="favttl">'+esc(e.t)+'</div>'
      +'<div class="favsub">'+PINSVG+' '+esc(v.name||'')+near+'</div>'
      +'<div class="favsub">'+esc(dateTxt(e))+'</div></div>'
      +'<button type="button" class="favrm" data-i="'+i+'" aria-label="移除">移除</button>'
      +'</div>';
  }).join('');
  /* 移除 */
  listEl.querySelectorAll('.favrm').forEach(btn=>{
    btn.addEventListener('click',ev=>{
      ev.stopPropagation();
      const idx=+btn.dataset.i; const it=items[idx]; if(!it) return;
      toggleFav(it.e,it.v);
      updateFavCountUI();
      renderFavPanel();
      updateVenueMarkerFav(it.v);
    });
  });
  /* 點整列聚焦該場館 */
  listEl.querySelectorAll('.favitem').forEach(row=>{
    row.addEventListener('click',()=>{
      const it=items[+row.dataset.i]; if(!it) return;
      map.setView([it.v.la,it.v.lo], Math.max(map.getZoom(),13));
    });
  });
  const showAll=document.getElementById('favShowAll');
  if(showAll) showAll.addEventListener('click',()=>{
    const pts=items.map(it=>[it.v.la,it.v.lo]);
    if(pts.length===1) map.setView(pts[0],14);
    else map.fitBounds(pts,{padding:[60,60],maxZoom:14});
  });
}
function openFavPanel(){
  renderFavPanel();
  document.getElementById('favScrim').classList.add('show');
  document.getElementById('favPanel').classList.add('show');
  const entry=document.getElementById('favEntry'); if(entry) entry.setAttribute('aria-expanded','true');
}
function closeFavPanel(){
  document.getElementById('favScrim').classList.remove('show');
  document.getElementById('favPanel').classList.remove('show');
  const entry=document.getElementById('favEntry'); if(entry) entry.setAttribute('aria-expanded','false');
}
(function wireFavPanel(){
  const entry=document.getElementById('favEntry');
  if(entry) entry.addEventListener('click',()=>{ favPanelOpen()?closeFavPanel():openFavPanel(); });
  const cl=document.getElementById('favClose'); if(cl) cl.addEventListener('click',closeFavPanel);
  const sc=document.getElementById('favScrim'); if(sc) sc.addEventListener('click',closeFavPanel);
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&favPanelOpen()) closeFavPanel(); });
})();

function openSheet(v){
  const exs=venueExs(v);
  sTitle.textContent=v.name;
  sMeta.innerHTML='<span>'+PINSVG+' '+esc(venueAddr(v))+'</span><span>共 '+exs.length+' 場</span>'
    +(v.src==='curated'?'<span class="flag">編輯整理</span>':'');
  cardsEl.innerHTML=exs.length?exs.map(e=>cardHtml(e,v.logo,v)).join(''):'<div class="empty">此篩選下無展覽</div>';
  scrim.classList.add('show'); sheet.classList.add('show');
}
function closeSheet(){scrim.classList.remove('show');sheet.classList.remove('show');if(typeof map!=='undefined'&&map.closePopup)map.closePopup();}
scrim.addEventListener('click',closeSheet); map.on('click',closeSheet);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();});

/* 側欄篩選 */
const sidebarEl=document.getElementById('sidebar'), fbtnEl=document.getElementById('fbtn');
if(fbtnEl) fbtnEl.addEventListener('click',()=>{
  const open=sidebarEl.classList.toggle('open');
  fbtnEl.classList.toggle('on',open);
  fbtnEl.setAttribute('aria-expanded',open?'true':'false');
});
document.getElementById('ftime').addEventListener('click',e=>{
  const b=e.target.closest('button[data-t]'); if(!b)return;
  document.querySelectorAll('#ftime button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); state.time=b.dataset.t;
  closeSheet(); rebuild();
});
document.getElementById('fform').addEventListener('click',e=>{
  const b=e.target.closest('button[data-f]'); if(!b)return;
  document.querySelectorAll('#fform button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); state.form=b.dataset.f; closeSheet(); rebuild();
});
/* 區域跳轉 */
const REGION={north:[[24.55,121.2],[25.35,122.05]],central:[[23.45,120.35],[24.6,121.3]],
 south:[[21.9,120.0],[23.5,120.95]],east:[[22.7,121.3],[24.95,122.0]]};
const REGION_CITIES={
  north:['台北','新北','桃園','基隆','新竹'],
  central:['台中','苗栗','彰化','南投','雲林'],
  south:['嘉義','台南','高雄','屏東'],
  east:['宜蘭','花蓮','台東']
};
const regionCitiesEl=document.getElementById('regionCities');
function cityBounds(city){
  const pts=[];
  DATA.venues.forEach(v=>{ if(v.city && v.city.indexOf(city)!==-1) pts.push([v.la,v.lo]); });
  return pts.length?pts:null;
}
function renderRegionCities(region){
  if(!region || region==='all' || !REGION_CITIES[region]){
    regionCitiesEl.style.display='none'; regionCitiesEl.innerHTML=''; return;
  }
  regionCitiesEl.innerHTML=REGION_CITIES[region]
    .map(c=>'<button data-city="'+c+'" data-region="'+region+'">'+c+'</button>').join('');
  regionCitiesEl.style.display='';
}
document.getElementById('regions').addEventListener('click',e=>{
  const b=e.target.closest('button[data-r]'); if(!b)return;
  closeSheet();
  document.querySelectorAll('#regions button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  if(b.dataset.r==='all'){ map.fitBounds(TW_BOUNDS,{padding:[16,16]}); renderRegionCities('all'); }
  else { map.fitBounds(REGION[b.dataset.r]); renderRegionCities(b.dataset.r); }
});
regionCitiesEl.addEventListener('click',e=>{
  const b=e.target.closest('button[data-city]'); if(!b)return;
  closeSheet();
  document.querySelectorAll('#regionCities button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const pts=cityBounds(b.dataset.city);
  if(pts) map.fitBounds(pts,{padding:[40,40],maxZoom:13});
  else map.fitBounds(REGION[b.dataset.region]);
});
/* 搜尋 */
let t=null;
document.getElementById('q').addEventListener('input',e=>{
  clearTimeout(t); t=setTimeout(()=>{ state.q=e.target.value.trim(); closeSheet(); rebuild(); },180);
});

(async function(){
  try{
    const r=await fetch('venues.json',{cache:'no-store'});
    if(r.ok){ const j=await r.json(); if(j&&j.venues&&j.venues.length){ DATA=j; liveMode=true; } }
  }catch(e){}
  document.getElementById('foot').innerHTML='資料來源：'+esc(DATA.source)+'｜更新 '+esc(DATA.updated)
    +(liveMode?'（即時）':'（內建備援）')+'｜地圖範圍：台灣本島與離島｜鄉鎮界 © g0v';
  rebuild();
})();
</script>
